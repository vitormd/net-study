worker_processes 1;
error_log /dev/stderr info;
events { worker_connections 1024; }

http {
  access_log /dev/stdout combined;
  default_type application/octet-stream;

  upstream app {
    server [fd00:dead:beef::20]:8000;
  }

  server {
    # Termina mTLS aqui — app downstream fala HTTP puro.
    listen      [::]:8443 ssl;
    listen      0.0.0.0:8443 ssl;
    http2       on;

    ssl_certificate         /run/server.crt;
    ssl_certificate_key     /run/server.key;
    ssl_client_certificate  /run/trust.crt;
    ssl_verify_client       on;          # equivalente ao force_peer do Puma
    ssl_verify_depth        2;
    ssl_protocols           TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://app;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      # Padrão XFCC (Envoy / ALB). Hash=SHA1 do cert do cliente.
      proxy_set_header X-Forwarded-Client-Cert
        "Hash=$ssl_client_fingerprint;Subject=\"$ssl_client_s_dn\";By=$ssl_server_name";

      # Atalhos pra app não precisar parsear XFCC se não quiser:
      proxy_set_header X-Client-Verify   $ssl_client_verify;
      proxy_set_header X-Client-Subject  $ssl_client_s_dn;
      proxy_set_header X-Client-Issuer   $ssl_client_i_dn;
      proxy_set_header X-Client-Serial   $ssl_client_serial;
    }
  }
}
